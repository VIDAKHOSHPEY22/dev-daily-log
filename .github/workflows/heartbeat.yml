name: ❤️ Daily Heartbeat

on:
  workflow_dispatch:
  schedule:
    # هر ۶ ساعت یکبار اجرا شود (مثل ریپازیتوری دوم)
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update Heartbeat
        run: |
          python <<EOF
          import json
          import random
          from datetime import datetime
          from zoneinfo import ZoneInfo

          tz = ZoneInfo("Asia/Tehran")
          now = datetime.now(tz)

          try:
              with open("heartbeat.json","r",encoding="utf8") as f:
                  hb = json.load(f)
          except FileNotFoundError:
              hb = {"heartbeat": 0}

          try:
              with open("quotes.json","r",encoding="utf8") as f:
                  quotes = json.load(f)
          except FileNotFoundError:
              quotes = [
                  "The best time to start was yesterday. The next best time is now.",
                  "Consistency is what transforms average into excellence.",
                  "Small daily improvements over time lead to stunning results.",
                  "Success is the sum of small efforts repeated day in and day out.",
                  "The secret of getting ahead is getting started.",
                  "It does not matter how slowly you go as long as you do not stop.",
                  "Success is not final, failure is not fatal: it is the courage to continue that counts.",
                  "Believe you can and you're halfway there.",
                  "Act as if what you do makes a difference. It does.",
                  "What you get by achieving your goals is not as important as what you become."
              ]

          hb["heartbeat"] = hb.get("heartbeat",0)+1
          hb["status"]="alive"
          hb["timezone"]="Asia/Tehran"
          hb["last_update"]=now.isoformat(timespec="seconds")
          hb["quote"]=random.choice(quotes)
          hb["day_of_week"]=now.strftime("%A")

          milestones={
              100:"🎉 One hundred days of consistency.",
              365:"🏆 One year of heartbeat.",
              500:"🚀 Five hundred check-ins.",
              1000:"❤️ One thousand heartbeats."
          }

          hb["milestone"]=milestones.get(hb["heartbeat"],"")

          with open("heartbeat.json","w",encoding="utf8") as f:
              json.dump(hb,f,indent=4,ensure_ascii=False)

          readme=f"""# ❤️ Daily Heartbeat

          A tiny GitHub Actions automation project.

          ## Latest Heartbeat

          ❤️ **Heartbeat:** {hb['heartbeat']}

          📅 **Last Update:** {hb['last_update']}

          🌍 **Timezone:** {hb['timezone']}

          📆 **Day:** {hb['day_of_week']}

          💬 **Quote**

          > {hb['quote']}

          {'🎉 '+hb['milestone'] if hb['milestone'] else ''}

          ---

          ## Why does this repository exist?

          Sometimes I'm unable to access GitHub because of:

          - Internet outages
          - Network restrictions
          - Power interruptions
          - Travel
          - Or simply being offline

          Instead of letting my automation stop, GitHub updates this heartbeat every morning.

          This repository is **not** my primary development repository.

          My actual work lives in my other repositories.

          Think of this as a small automated "I'm still here" signal.

          ❤️ Keep Building.
          """

          with open("README.md","w",encoding="utf8") as f:
              f.write(readme)
          EOF

      - name: Commit & Push (with your identity)
        run: |
          # تنظیم با اسم و ایمیل خودتان (مثل ریپازیتوری دوم)
          git config user.name "VIDAKHOSHPEY22"
          git config user.email "vidatwin18@gmail.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "❤️ Daily Heartbeat"
          git push
